meters:
- name: patients
  description: Patients managed in the hosted Medical API, a primary driver of Medical API cloud cost.
  unit: patients
  aggregation: sum
  dimensions:
  - account
  - facility
- name: document_queries
  description: Network document queries triggered per patient across the HIE networks.
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - patient
- name: consolidated_queries
  description: Consolidated FHIR data queries assembling a patient's medical history.
  unit: queries
  aggregation: sum
  dimensions:
  - account
  - patient
- name: medical_record_summaries
  description: AI medical record summaries generated from consolidated data.
  unit: summaries
  aggregation: sum
  dimensions:
  - account
  - patient
- name: connected_users
  description: Devices API users with at least one connected provider, billed per user per month.
  unit: users
  aggregation: sum
  dimensions:
  - account
  - provider
- name: devices_data_reads
  description: Reads of normalized activity, biometrics, body, nutrition, and sleep data.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - dataType
- name: self_hosted_infrastructure
  description: Infrastructure and third-party network costs for self-hosted deployments (not billed by Metriport).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - environment
principles:
- name: Visibility
  description: Track patient volume, document/consolidated query counts, and connected users; for self-hosting, monitor your own cloud infrastructure spend.
- name: Allocation
  description: Tag API keys and facilities per workload/team; map patient and connected-user volume to internal cost centers.
- name: Optimization
  description: Self-host to avoid per-call cloud charges where scale justifies it; scope consolidated queries by resource type and date range; only query documents for active patients.
- name: Accountability
  description: Assign owners per facility/project; review patient volume and connected-user counts monthly against budget.
maintainers:
