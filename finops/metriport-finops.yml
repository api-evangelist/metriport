description: >-
  FinOps view of Metriport spend. Cost depends on the deployment model:
  self-hosting the open-source code shifts spend to your own infrastructure and
  third-party network fees (no per-call charge from Metriport), while the hosted
  Metriport cloud is usage-based - the Medical API is quoted on monthly patient
  volume and the Devices API on connected users per month. Document and
  consolidated queries are asynchronous, so volume drives both compute and any
  per-patient cloud charges.
notes: >-
  Distinguish self-hosted infrastructure spend from hosted cloud usage charges.
  Cloud rates are custom-quoted; reconcile exact figures with Metriport.
sources:
- https://www.metriport.com/pricing
