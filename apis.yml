aid: metriport
url: https://raw.githubusercontent.com/api-evangelist/metriport/refs/heads/main/apis.yml
name: Metriport
kind: company
description: Metriport is an open-source, universal API for healthcare data. The Medical
  API exchanges patient medical records across the CommonWell and Carequality networks
  and returns consolidated FHIR R4 data, while the Devices API hydrates activity, biometrics,
  nutrition, and sleep data from consumer wearables and mHealth apps. Companies can
  use the hosted Metriport cloud or self-host the open-source code to avoid vendor
  lock-in.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Healthcare
- Medical Records
- FHIR
- Health Data
- Wearables
- Open Source
